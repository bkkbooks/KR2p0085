body:
  text: 古公見大公望於呂遂曰吾聞周宗有難而不榗聞光烈之族古公有慶子嘗以此謑之其白黑將可知也古公子訪之尚父舉治文王曰日短而世困得尚父載我天下子失尚父遂我周懼既言而尚父乃階至惟七年文王訪於尚父曰我左患右難吾欲達中持道昔我得中世世毋有後悔惟道有所修非天之所向莫之能得當退而思之其唯賢民乎子爲我之道寡人不能一焉而介𦁉代之夫立民天下之難事也或以興或以亡公其盡之夫顧監于下乃語周之先祖曰天之所向若或與之天之所背若拒之物有所總從也非天子之差佐也請私之於夫子昔者舜以大乃往既見將反文王乃安恭以五殺不舉其民能相分餘三年不生粟五年亡凍餒者此之善也文王曰請見人疐陟湯修理善見設文王曰道有要乎尚父曰敬人而親道毋自設而信於是用將焉文王曰請問其矣尚父乃言曰夫先四帝二王之啓行五度湯行三起文王曰道有守乎尚父曰黃帝俫釐光堯茖尚父曰黃帝修三員不知其所極文王曰有後蓋乎尚父曰黃帝修三員備日行習無智設皆紀四正受任五事皆問日行尚父曰日行乎用以果而波被潛憯以成鄰而均庶遠而先達此日行也堯王天下備服方恒吝長明行四訪之於子曰從政何先禹答曰唯志堯則物生瀆則智成金厚不流玉則不戡堯以四害之紊爲未也乃問於禹曰大害既制小居時何先曰毋忘其所不能堯曰嗚呼日月閟間歲盡察之於堯堯始用之嘉德舜王天下三苗不賓舜不割其道不塞其曰理政固在長請失也怨并之眾人也非能合德於世者也明則保國知賢政治教美民服禹王天下服深恒厚五年而天下正一曰禹事堯天下大水堯乃就禹曰乞汝其往疏川啓谷以瀆天下禹疏江爲三疏河爲九百川皆導塞敷九十決瀆三百首耇黧句指身命鱗粗禹使民以二和民乃盡力百川既導天下能恒二曰奉舜踵德施于四國誨以勞民畿而盡禹奮中疾志有欲而弗違深實固疏湑有功而弗廢三曰禹王天下昭大志不私棄身生行勞民死行不祭前行建功中行固同終行不窮
